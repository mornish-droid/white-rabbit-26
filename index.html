<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; width: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0f172a; color: #e2e8f0; overflow: hidden;
  }
  #app { height: 100vh; width: 100%; display: flex; flex-direction: column; }

  .landing {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 2rem; text-align: center;
  }
  .landing h1 {
    font-size: 2.25rem; margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .landing p { color: #94a3b8; margin-bottom: 2rem; font-size: 0.95rem; max-width: 340px; }
  .landing code { background: #1e293b; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.85em; }
  .mode-buttons { display: flex; flex-direction: column; gap: 0.85rem; width: 100%; max-width: 340px; }
  .mode-btn {
    padding: 1.15rem; border: none; border-radius: 14px; font-size: 1.05rem;
    font-weight: 600; cursor: pointer; transition: transform 0.1s; color: white;
  }
  .mode-btn:active:not(:disabled) { transform: scale(0.97); }
  .mode-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .mode-btn.broadcast { background: linear-gradient(135deg, #ef4444, #dc2626); box-shadow: 0 4px 14px rgba(239,68,68,0.3); }
  .mode-btn.view { background: linear-gradient(135deg, #3b82f6, #2563eb); box-shadow: 0 4px 14px rgba(59,130,246,0.3); }

  .setup {
    flex: 1; display: flex; flex-direction: column;
    padding: 1.25rem; max-width: 500px; margin: 0 auto; width: 100%;
    overflow-y: auto;
  }
  .setup h2 { margin-bottom: 1rem; font-size: 1.4rem; }
  .field { margin-bottom: 1.25rem; }
  .field label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.5rem; }
  .field input[type="text"] {
    width: 100%; padding: 0.85rem;
    background: #1e293b; border: 1px solid #334155; border-radius: 10px;
    color: #e2e8f0; font-size: 1rem;
  }
  .field input[type="text"]:focus { outline: none; border-color: #60a5fa; }

  .pin-preview { background: #1e293b; border: 1px solid #334155; border-radius: 14px; padding: 1rem; text-align: center; }
  .pin-preview img {
    width: 96px; height: 96px; object-fit: cover; border-radius: 50%;
    border: 4px solid #fff; box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    display: block; margin: 0 auto;
  }
  .subtle-hint { color: #64748b; font-size: 0.78rem; margin-top: 0.55rem; text-align: center; }

  .primary-btn {
    width: 100%; padding: 1rem;
    background: linear-gradient(135deg, #10b981, #059669);
    color: white; border: none; border-radius: 12px;
    font-size: 1.05rem; font-weight: 600; cursor: pointer;
    margin-top: 1rem; transition: opacity 0.2s;
  }
  .primary-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .primary-btn:active:not(:disabled) { transform: scale(0.98); }
  .back-btn {
    background: transparent; border: 1px solid #334155;
    color: #94a3b8; padding: 0.4rem 0.85rem; border-radius: 8px;
    cursor: pointer; font-size: 0.85rem; margin-bottom: 1rem;
    align-self: flex-start;
  }

  .map-view { flex: 1; display: flex; flex-direction: column; position: relative; min-height: 0; }
  #map { flex: 1; background: #1e293b; min-height: 300px; }

  .status-bar {
    background: rgba(15,23,42,0.95);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    padding: 0.75rem 1rem; border-bottom: 1px solid #334155;
    display: flex; align-items: center; gap: 0.75rem; font-size: 0.9rem;
    flex-shrink: 0;
  }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #10b981; animation: pulse 1.5s infinite; flex-shrink: 0; }
  .status-dot.offline { background: #ef4444; animation: none; }
  .status-dot.waiting { background: #f59e0b; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.35;} }
  .status-text { flex: 1; min-width: 0; }
  .status-main { font-weight: 500; }
  .status-sub { color: #94a3b8; font-size: 0.78rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .stop-btn { background: #dc2626; color: white; border: none; padding: 0.45rem 0.85rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 500; flex-shrink: 0; }
  .stop-btn.secondary { background: #475569; }

  .share-panel {
    position: absolute; top: 64px; left: 50%; transform: translateX(-50%);
    background: rgba(15,23,42,0.97); backdrop-filter: blur(10px);
    padding: 0.75rem 0.9rem; border-radius: 12px;
    border: 1px solid #334155; z-index: 1000;
    max-width: 92%; display: flex; align-items: center; gap: 0.5rem;
  }
  .share-panel .url {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 0.72rem; color: #cbd5e1;
    max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1;
  }
  .share-panel button {
    background: #3b82f6; color: white; border: none;
    padding: 0.4rem 0.7rem; border-radius: 6px; cursor: pointer;
    font-size: 0.78rem; font-weight: 500; white-space: nowrap;
  }
  .share-panel button:active { background: #2563eb; }

  .custom-pin { background: none !important; border: none !important; }
  .pin-wrap {
    width: 64px; height: 64px; border-radius: 50%; overflow: hidden;
    border: 4px solid #fff; box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    background: #fff; position: relative;
  }
  .pin-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .pin-pulse {
    position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px;
    border-radius: 50%; border: 3px solid #60a5fa;
    animation: pingPulse 2s infinite; pointer-events: none;
  }
  @keyframes pingPulse { 0%{transform:scale(1);opacity:0.9;} 100%{transform:scale(1.8);opacity:0;} }

  .error { background: #7f1d1d; color: #fecaca; padding: 0.7rem 0.85rem; border-radius: 8px; margin-bottom: 0.85rem; font-size: 0.88rem; }
  .config-error { max-width: 500px; margin: 3rem auto; padding: 1.5rem; background: #1e293b; border: 1px solid #ef4444; border-radius: 12px; }
  .config-error h2 { color: #fca5a5; margin-bottom: 0.75rem; }
  .config-error code { background: #0f172a; padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.85rem; color: #fbbf24; }
  .leaflet-container { font-family: inherit; }
</style>

          <label>Pin that will appear on the map</label>
          <div class="pin-preview">
            <img src="${DEFAULT_PIN}" alt="parade pin" />
            <div class="subtle-hint" style="margin-top:0.4rem;">The White Rabbit is on the case.</div>
          </div>
        </div>
        <div id="err"></div>
        <button class="primary-btn" id="start">Start broadcasting</button>
      </div>
    `;
    document.getElementById('back').onclick = renderLanding;
    document.getElementById('start').onclick = startBroadcast;
  }

  async function startBroadcast() {
    if (!navigator.geolocation) {
      showError('Geolocation is not supported on this device.');
      return;
    }
    state.paradeTitle = document.getElementById('title').value.trim() || 'Parade';

    // 1) Request location permission SYNCHRONOUSLY from the click handler.
    let firstPos;
    try {
      firstPos = await new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, {
          enableHighAccuracy: true, timeout: 20000, maximumAge: 0
        });
      });
    } catch (err) {
      if (err && err.code === 1) {
        showError("Location permission denied. Enable location for this site and try again.");
      } else if (err && err.code === 3) {
        showError("Location timed out. Move to somewhere with a clearer sky view and try again.");
      } else {
        showError("Couldn't get your location: " + ((err && err.message) || 'unknown error'));
      }
      return;
    }

    // 2) Ensure topic exists in URL (generate if missing)
    state.topic = getTopic() || generateTopic();
    setTopic(state.topic);

    // 3) Open the Supabase channel (Presence: broadcaster tracks its state)
    state.channel = sb.channel('parade:' + state.topic, {
      config: { presence: { key: 'broadcaster' } }
    });
    try {
      await new Promise((resolve, reject) => {
        state.channel.subscribe((status, err) => {
          if (status === 'SUBSCRIBED') resolve();
          if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') reject(err || new Error(status));
        });
      });
    } catch (err) {
      showError("Couldn't connect to live sync: " + (err.message || 'check Supabase URL/key'));
      return;
    }

    // 4) Wake lock (optional)
    try {
      if ('wakeLock' in navigator) {
        state.wakeLock = await navigator.wakeLock.request('screen');
        document.addEventListener('visibilitychange', reacquireWakeLock);
      }
    } catch (e) { /* non-fatal */ }

    renderBroadcasterActive(firstPos);
  }

  async function reacquireWakeLock() {
    if (document.visibilityState === 'visible' && 'wakeLock' in navigator) {
      try { state.wakeLock = await navigator.wakeLock.request('screen'); } catch {}
    }
  }

  function renderBroadcasterActive(firstPos) {
    app.innerHTML = `
      <div class="map-view">
        <div class="status-bar">
          <div class="status-dot" id="dot"></div>
          <div class="status-text">
            <div class="status-main" id="status-main">Live</div>
            <div class="status-sub" id="status-sub">Broadcasting as "${escapeHtml(state.paradeTitle)}"</div>
          </div>
          <button class="stop-btn" id="stop">Stop</button>
        </div>
        <div id="map"></div>
        <div class="share-panel">
          <div class="url" id="share-url">${escapeHtml(shareableUrl())}</div>
          <button id="copy-btn">Copy link</button>
        </div>
      </div>
    `;
    document.getElementById('stop').onclick = () => { cleanup(); renderLanding(); };
    document.getElementById('copy-btn').onclick = copyShareUrl;

    if (typeof L === 'undefined') {
      setDot('offline');
      setText('status-main', 'Map library failed to load');
      setText('status-sub', 'Check your internet connection and refresh');
      return;
    }

    try {
      initMap([firstPos.coords.latitude, firstPos.coords.longitude], 17);
    } catch (err) {
      setDot('offline');
      setText('status-main', 'Map failed to initialize');
      setText('status-sub', err.message || 'Unknown error');
      return;
    }

    // Seed with the first fix
    onPositionUpdate(firstPos);

    state.watchId = navigator.geolocation.watchPosition(
      onPositionUpdate,
      onPositionError,
      { enableHighAccuracy: true, maximumAge: 0, timeout: 20000 }
    );
  }

  async function onPositionUpdate(pos) {
    state._gotFirstFix = true;
    const { latitude, longitude, accuracy } = pos.coords;
    const now = Date.now();
    const payload = {
      lat: latitude, lng: longitude,
      accuracy, timestamp: now,
      title: state.paradeTitle
    };

    // Throttle to SEND_THROTTLE_MS
    if (now - state._lastSend > SEND_THROTTLE_MS) {
      state._lastSend = now;
      try {
        await state.channel.track(payload);
      } catch (e) {
        console.warn('track failed', e);
      }
    }

    updateMapMarker(latitude, longitude, DEFAULT_PIN);
    if (!state._centered) {
      state.map.setView([latitude, longitude], 17);
      state._centered = true;
    } else {
      state.map.panTo([latitude, longitude], { animate: true, duration: 0.5 });
    }

    setDot('live');
    setText('status-main', 'Live · accuracy ±' + Math.round(accuracy) + 'm');
    setText('status-sub', latitude.toFixed(5) + ', ' + longitude.toFixed(5));
  }

  function onPositionError(err) {
    setDot('offline');
    setText('status-main', 'Location error');
    setText('status-sub',
      err.code === 1 ? 'Permission denied — re-enable location in browser settings'
                     : err.message);
  }

  async function copyShareUrl() {
    const url = shareableUrl();
    try {
      await navigator.clipboard.writeText(url);
      const btn = document.getElementById('copy-btn');
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = orig; }, 1500);
    } catch {
      // Fallback: select text
      const urlEl = document.getElementById('share-url');
      const range = document.createRange();
      range.selectNodeContents(urlEl);
      const sel = window.getSelection();
      sel.removeAllRanges(); sel.addRange(range);
    }
  }

  // ---------- Viewer ----------
  async function startViewer() {
    cleanup();
    state.topic = getTopic();
    if (!state.topic) {
      app.innerHTML = '<div class="config-error"><h2>No stream</h2><p>This link has no broadcaster topic. Ask the broadcaster for the link.</p></div>';
      return;
    }

    app.innerHTML = `
      <div class="map-view">
        <div class="status-bar">
          <div class="status-dot waiting" id="dot"></div>
          <div class="status-text">
            <div class="status-main" id="status-main">Waiting for broadcaster…</div>
            <div class="status-sub" id="status-sub">Connecting to live stream</div>
          </div>
          <button class="stop-btn secondary" id="stop">Back</button>
        </div>
        <div id="map"></div>
      </div>
    `;
    document.getElementById('stop').onclick = () => { cleanup(); renderLanding(); };

    if (typeof L === 'undefined') {
      setDot('offline');
      setText('status-main', 'Map library failed to load');
      return;
    }

    initMap([0, 0], 2);

    state.channel = sb.channel('parade:' + state.topic, {
      config: { presence: { key: 'viewer_' + Math.random().toString(36).slice(2, 8) } }
    });

    state.channel.on('presence', { event: 'sync' }, () => {
      const st = state.channel.presenceState();
      const broadcaster = st.broadcaster && st.broadcaster[0];
      if (broadcaster) handleRemoteUpdate(broadcaster);
    });

    try {
      await new Promise((resolve, reject) => {
        state.channel.subscribe((status, err) => {
          if (status === 'SUBSCRIBED') resolve();
          if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') reject(err || new Error(status));
        });
      });
      setText('status-sub', 'Connected · waiting for broadcaster');
    } catch (err) {
      setDot('offline');
      setText('status-main', 'Connection failed');
      setText('status-sub', err.message || 'Check your internet');
      return;
    }

    // Staleness checker
    state._stalenessInterval = setInterval(checkStaleness, 3000);
  }

  function handleRemoteUpdate(data) {
    state._lastLoc = data;
    updateMapMarker(data.lat, data.lng, DEFAULT_PIN);
    if (!state._centered) {
      state.map.setView([data.lat, data.lng], 17);
      state._centered = true;
    } else {
      state.map.panTo([data.lat, data.lng], { animate: true, duration: 0.5 });
    }
    const ageS = Math.max(0, Math.round((Date.now() - data.timestamp) / 1000));
    setDot('live');
    setText('status-main', ageS < 6 ? 'Live' : 'Updated ' + formatAge(ageS) + ' ago');
    setText('status-sub',
      (data.title ? data.title + ' · ' : '') + '±' + Math.round(data.accuracy) + 'm');
  }

  function checkStaleness() {
    if (!state._lastLoc) return;
    const ageS = Math.round((Date.now() - state._lastLoc.timestamp) / 1000);
    if (ageS > STALE_THRESHOLD_S) {
      setDot('offline');
      setText('status-main', 'Signal lost · last seen ' + formatAge(ageS) + ' ago');
    } else if (ageS > 5) {
      setDot('live');
      setText('status-main', 'Updated ' + formatAge(ageS) + ' ago');
    }
  }

  // ---------- Map helpers ----------
  function initMap(center, zoom) {
    state.map = L.map('map', { zoomControl: true, attributionControl: true }).setView(center, zoom);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap', maxZoom: 19
    }).addTo(state.map);
    setTimeout(() => state.map && state.map.invalidateSize(), 50);
  }

  function updateMapMarker(lat, lng, imageUrl) {
    const html = '<div class="pin-wrap"><div class="pin-pulse"></div><img src="' + imageUrl + '" /></div>';
    const icon = L.divIcon({ html, className: 'custom-pin', iconSize: [64, 64], iconAnchor: [32, 32] });
    if (!state.marker) {
      state.marker = L.marker([lat, lng], { icon }).addTo(state.map);
    } else {
      state.marker.setLatLng([lat, lng]);
      state.marker.setIcon(icon);
    }
  }

  // ---------- Utils ----------
  function setDot(kind) {
    const d = document.getElementById('dot');
    if (!d) return;
    d.className = 'status-dot' + (kind === 'live' ? '' : ' ' + kind);
  }
  function setText(id, text) {
    const el = document.getElementById(id);
    if (el) el.textContent = text;
  }
  function formatAge(s) {
    if (s < 60) return s + 's';
    if (s < 3600) return Math.floor(s / 60) + 'm';
    return Math.floor(s / 3600) + 'h';
  }
  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function showError(msg) {
    const err = document.getElementById('err');
    if (err) err.innerHTML = '<div class="error">' + escapeHtml(msg) + '</div>';
  }
  function cleanup() {
    if (state.watchId != null) { navigator.geolocation.clearWatch(state.watchId); state.watchId = null; }
    if (state._stalenessInterval) { clearInterval(state._stalenessInterval); state._stalenessInterval = null; }
    if (state._locHintTimer) { clearTimeout(state._locHintTimer); state._locHintTimer = null; }
    if (state.wakeLock) { try { state.wakeLock.release(); } catch {} state.wakeLock = null; }
    document.removeEventListener('visibilitychange', reacquireWakeLock);
    if (state.channel) { try { sb.removeChannel(state.channel); } catch {} state.channel = null; }
    if (state.map) { try { state.map.remove(); } catch {} state.map = null; state.marker = null; }
    state._centered = false;
    state._lastSend = 0;
    state._gotFirstFix = false;
    state._lastLoc = null;
  }

  // Handle hash changes (e.g., shared link opened directly)
  window.addEventListener('hashchange', () => {
    // only re-render if we're on landing
    if (document.querySelector('.landing')) renderLanding();
  });

  renderLanding();
})();
</script>
